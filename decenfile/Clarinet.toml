[project]
name = "decenfile"
description = "A decentralized recruitment platform built on Stacks blockchain"
authors = []
telemetry = false
cache_dir = "./.cache"
requirements = []

[contracts.jobs]
path = "contracts/jobs.clar"
clarity_version = 1
epoch = "2.05"

[contracts.applicants]
path = "contracts/applicants.clar"
clarity_version = 1
epoch = "2.05"

[contracts.matching]
path = "contracts/matching.clar"
clarity_version = 1
epoch = "2.05"

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false

# Simnet deployment configuration
[repl.networks]
testnet = { stacks-node = "https://stacks-node-api.testnet.stacks.co" }
mainnet = { stacks-node = "https://stacks-node-api.mainnet.stacks.co" }

# Development simnet configuration
[[project.devnet.contracts]]
id = "SP2PABAF9FTAJYNFZH93XENAJ8FVY99RRM50D2JG9.nft-trait"
apply-transaction = false
path = ".clarinet/contracts/SP2PABAF9FTAJYNFZH93XENAJ8FVY99RRM50D2JG9.nft-trait.clar"

[[project.devnet.contracts]]
id = "SP2PABAF9FTAJYNFZH93XENAJ8FVY99RRM50D2JG9.ft-trait"
apply-transaction = false
path = ".clarinet/contracts/SP2PABAF9FTAJYNFZH93XENAJ8FVY99RRM50D2JG9.ft-trait.clar"

